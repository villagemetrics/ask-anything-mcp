name: Test and Publish

on:
  push:
    branches: [main, develop]
  workflow_dispatch: # Allow manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.repository == 'villagemetrics/ask-anything-mcp'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          VM_MCP_TOKEN: ${{ secrets.VM_MCP_TOKEN }}
          VM_API_BASE_URL: "https://api-dev.villagemetrics.com"
          NODE_ENV: test

  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'villagemetrics/ask-anything-mcp' && github.ref == 'refs/heads/main'
    needs: test
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing (OIDC)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 bundles npm >= 11.6, which satisfies trusted publishing's
          # npm >= 11.5.1 requirement. Do not npm install -g npm@latest here -
          # npm overwriting itself on the runner corrupts the install.
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Check if version already published
        id: check_version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          # The npm registry is the ground truth: publish only if this exact
          # version isn't there yet. Same-version commits (docs, workflow
          # changes) skip publish gracefully instead of failing the build.
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version 2>/dev/null; then
            echo "⚠️ Version $PACKAGE_VERSION already exists on npm, skipping publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Version $PACKAGE_VERSION not found on npm, will publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

      - name: Publish to NPM (trusted publishing, no token)
        if: steps.check_version.outputs.should_publish == 'true'
        run: npm publish --access public

      - name: Notify success
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          echo "✅ Successfully published ${{ steps.check_version.outputs.package_name }}@${{ steps.check_version.outputs.package_version }} to NPM"
          
      - name: Notify skip
        if: steps.check_version.outputs.should_publish == 'false'
        run: |
          echo "⚠️ Version ${{ steps.check_version.outputs.package_version }} already exists on NPM, skipping publish"